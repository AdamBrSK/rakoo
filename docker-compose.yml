services:
  backend:
    build: ./backend
    container_name: rakoo-backend
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: rakoo-frontend
    ports:
      - "3001:3000"
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend