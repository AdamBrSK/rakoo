services:
  db:
    image: postgres:15
    container_name: rakoo-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend_db_net

  backend:
    build: ./backend
    container_name: rakoo-backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      FLASK_ENV: ${FLASK_ENV}
      # For later when you add Azure
      AZURE_ENDPOINT: ${AZURE_ENDPOINT}
      AZURE_KEY: ${AZURE_KEY}
    ports:
      - "${BACKEND_PORT}:5000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
    networks:
      - frontend_backend_net
      - backend_db_net

  frontend:
    build: ./frontend
    container_name: rakoo-frontend
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - frontend_backend_net

networks:
  frontend_backend_net:
    driver: bridge
  backend_db_net:
    driver: bridge

volumes:
  postgres_data: